# ===============================================================
# File: api.conf
# Location: conf/nginx/ratelimit.d/api.conf
#
# Purpose:
#   A separate per-IP limiter for API endpoints.
#   This is looser than the landing page profile because clients
#   may legitimately issue multiple concurrent requests.
#
# Usage:
#   http {
#       include /etc/nginx/ratelimit.d/api.conf;
#   }
#
#   server {
#       location /api/ {
#           include /etc/nginx/ratelimit.d/api-server.conf;
#       }
#   }
#
# ===============================================================

limit_req_zone $binary_remote_addr zone=api_per_ip:20m rate=10r/s;
