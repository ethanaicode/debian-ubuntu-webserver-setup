# ===============================================================
# File: landing-page.conf
# Location: conf/nginx/ratelimit.d/landing-page.conf
#
# Purpose:
#   Strict per-IP throttling for simple landing pages.
#   Include this in http {} to define the zone, then include the
#   companion server-level limiter in the landing page vhost.
#
# Usage:
#   http {
#       include /etc/nginx/ratelimit.d/landing-page.conf;
#   }
#
#   server {
#       include /etc/nginx/ratelimit.d/landing-page-server.conf;
#   }
#
# Notes:
#   - Use the real client IP when nginx is behind a proxy/CDN.
#   - Adjust the rate and burst to avoid blocking normal page loads.
#
# ===============================================================

limit_req_zone $binary_remote_addr zone=landing_per_ip:20m rate=5r/s;
