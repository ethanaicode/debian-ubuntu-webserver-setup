# ===============================================================
# File: landing-page-server.conf
# Location: conf/nginx/ratelimit.d/landing-page-server.conf
#
# Purpose:
#   Server-level limiter for a simple landing page.
#   Keep the burst small so abusive clients are cut off quickly.
#
# Usage:
#   server {
#       include /etc/nginx/ratelimit.d/landing-page-server.conf;
#   }
#
# ===============================================================

limit_req zone=landing_per_ip burst=15 nodelay;
limit_req_status 444;
