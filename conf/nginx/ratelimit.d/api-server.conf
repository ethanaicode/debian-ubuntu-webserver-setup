# ===============================================================
# File: api-server.conf
# Location: conf/nginx/ratelimit.d/api-server.conf
#
# Purpose:
#   Server- or location-level limiter for API endpoints.
#   This keeps a larger burst so normal parallel client requests
#   are less likely to be rejected.
#
# Usage:
#   server {
#       location /api/ {
#           include /etc/nginx/ratelimit.d/api-server.conf;
#       }
#   }
#
# ===============================================================

limit_req zone=api_per_ip burst=30 nodelay;
limit_req_status 444;
