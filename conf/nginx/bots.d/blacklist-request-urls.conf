map $request_uri $block_url {
    default 0;

    # Common scanner probes
    "~*^/\.git/" 1;
    "~*^/\.svn(?:/|$)" 1;
    "~*^/\.hg(?:/|$)" 1;
    "~*^/\.bzr(?:/|$)" 1;
    "~*^/\.DS_Store(?:\?|$)" 1;
    "~*^/\.ht(?:access|passwd)(?:\?|$)" 1;

    # Infrastructure / deployment config probes
    "~*^/(?:docker-compose|docker)\.ya?ml(?:\?|$)" 1;
    "~*^/serverless\.yml(?:\?|$)" 1;
    "~*^/terraform\.tfvars(?:\?|$)" 1;
    "~*^/(?:Dockerfile|dockerfile)(?:\?|$)" 1;

    # Secret/key and backup leak probes
    "~*^/(?:id_rsa|id_dsa|authorized_keys)(?:\?|$)" 1;
    "~*^/\.env(?:\..+)?(?:\?|$)" 1;
    "~*^/.*\.(?:bak|old|orig|save|swp)(?:\?|$)" 1;

    # Typical framework / exploit scanner probes
    "~*^/(?:vendor/phpunit|phpunit)/" 1;
    "~*^/(?:actuator|jolokia)/(?:env|heapdump|logfile|configprops|beans)" 1;

    # Random short path scanner probe sample seen in logs
    "~*^/jw(?:\?|$)" 1;

    # Query-based path traversal / sensitive file probes
    "~*(?:^|\?|&)load=.*(?:\.\.|%2e%2e).*(?:/|\\\\|%2f|%5c)" 1;
    "~*(?:^|\?|&)(?:load|file|path)=.*(?:\.aws(?:/|\\\\|%2f|%5c)?credentials|aws(?:/|\\\\|%2f|%5c)credentials)" 1;

    "~*^/\?rest_route=" 1;
    "~*^/feed/" 1;
    "~*^/comments/feed/" 1;
    "~*^/readme\.html" 1;
}